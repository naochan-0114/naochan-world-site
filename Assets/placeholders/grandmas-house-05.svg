  <defs>
    <linearGradient id="sky" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#9ed3ff"/>
      <stop offset="55%" stop-color="#86bcdf"/>
      <stop offset="100%" stop-color="#709ac7"/>
